<script>
// ═════════════════════════════════════════════════════════════
//            T H E   F O R G O T T E N   O N E 
// A narrative exploration game about memory, loss, and identity.
//                       M.B. Parks
// ═════════════════════════════════════════════════════════════

const OPP={north:'south',south:'north',east:'west',west:'east'};
const DSH={n:'north',s:'south',e:'east',w:'west'};
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// ─────────────── PROCEDURAL AUDIO ENGINE ────────────────

class Sound {
  constructor(){this.ctx=null;this.master=null;this.drone=null;this.droneGain=null;this.rumble=null;this.rumbleGain=null;this.started=false}

  init(){
    if(this.started)return;
    try{
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      this.master=this.ctx.createGain();this.master.gain.value=0.3;this.master.connect(this.ctx.destination);
      this.started=true;this.startDrone('ground');
    }catch(e){/* audio not supported, game still works */}
  }

  startDrone(type){
    if(!this.ctx)return;
    this.stopDrone();
    const now=this.ctx.currentTime;
    // Base drone: low oscillator + filtered noise
    const osc=this.ctx.createOscillator();
    const gain=this.ctx.createGain();
    const filter=this.ctx.createBiquadFilter();
    filter.type='lowpass';
    osc.type='sine';
    gain.gain.value=0;
    gain.gain.linearRampToValueAtTime(0.12,now+2);

    if(type==='ground'){osc.frequency.value=55;filter.frequency.value=200}
    else if(type==='upper'){osc.frequency.value=65;filter.frequency.value=250}
    else if(type==='darkness'){osc.frequency.value=35;filter.frequency.value=120}
    else{osc.frequency.value=50;filter.frequency.value=180}

    osc.connect(filter);filter.connect(gain);gain.connect(this.master);
    osc.start(now);
    this.drone=osc;this.droneGain=gain;
  }

  stopDrone(){
    if(!this.ctx||!this.drone)return;
    try{this.droneGain.gain.linearRampToValueAtTime(0,this.ctx.currentTime+0.5);
      const d=this.drone;setTimeout(()=>{try{d.stop()}catch(e){}},600);
    }catch(e){}
    this.drone=null;this.droneGain=null;
  }

  playNote(freq,duration,delay=0){
    if(!this.ctx)return;
    const now=this.ctx.currentTime+delay;
    const osc=this.ctx.createOscillator();
    const gain=this.ctx.createGain();
    osc.type='sine';osc.frequency.value=freq;
    // Music box: fast attack, medium decay
    gain.gain.setValueAtTime(0,now);
    gain.gain.linearRampToValueAtTime(0.25,now+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001,now+duration);
    osc.connect(gain);gain.connect(this.master);
    osc.start(now);osc.stop(now+duration);
  }

  playLullaby(){
    // E4-G4-B4 rising, B4-G4-E4 falling — music box timbre
    const notes=[329.63,392.00,493.88,493.88,392.00,329.63];
    notes.forEach((f,i)=>this.playNote(f,0.8,i*0.45));
  }

  playMemoryChord(){
    if(!this.ctx)return;
    // Warm C major: C4, E4, G4, C5 — slow swell
    const freqs=[261.63,329.63,392.00,523.25];
    const now=this.ctx.currentTime;
    freqs.forEach(f=>{
      const osc=this.ctx.createOscillator();const gain=this.ctx.createGain();
      osc.type='sine';osc.frequency.value=f;
      gain.gain.setValueAtTime(0,now);
      gain.gain.linearRampToValueAtTime(0.1,now+1.5);
      gain.gain.exponentialRampToValueAtTime(0.001,now+4);
      osc.connect(gain);gain.connect(this.master);
      osc.start(now);osc.stop(now+4.5);
    });
  }

  playDarknessRumble(intensity){
    if(!this.ctx)return;
    this.stopRumble();
    const now=this.ctx.currentTime;
    const osc=this.ctx.createOscillator();const gain=this.ctx.createGain();
    osc.type='sawtooth';
    osc.frequency.value=25+intensity*5;
    const vol=[0.04,0.08,0.15][Math.min(intensity,2)];
    gain.gain.setValueAtTime(0,now);
    gain.gain.linearRampToValueAtTime(vol,now+1);
    const filt=this.ctx.createBiquadFilter();
    filt.type='lowpass';filt.frequency.value=60+intensity*20;
    osc.connect(filt);filt.connect(gain);gain.connect(this.master);
    osc.start(now);
    this.rumble=osc;this.rumbleGain=gain;
  }

  stopRumble(){
    if(!this.ctx||!this.rumble)return;
    try{this.rumbleGain.gain.linearRampToValueAtTime(0,this.ctx.currentTime+0.3);
      const r=this.rumble;setTimeout(()=>{try{r.stop()}catch(e){}},400);
    }catch(e){}
    this.rumble=null;this.rumbleGain=null;
  }

  playBanish(){
    if(!this.ctx)return;
    this.stopRumble();
    this.playLullaby();
    // Add a warm resolution after the lullaby
    setTimeout(()=>this.playMemoryChord(),3000);
  }

  playFinale(){
    if(!this.ctx)return;
    this.stopDrone();this.stopRumble();
    // Silence... then a slow, warm major chord
    setTimeout(()=>{
      const freqs=[261.63,329.63,392.00,523.25,659.25];
      const now=this.ctx.currentTime;
      freqs.forEach((f,i)=>{
        const osc=this.ctx.createOscillator();const gain=this.ctx.createGain();
        osc.type='sine';osc.frequency.value=f;
        gain.gain.setValueAtTime(0,now+i*0.3);
        gain.gain.linearRampToValueAtTime(0.08,now+i*0.3+2);
        gain.gain.linearRampToValueAtTime(0,now+i*0.3+8);
        osc.connect(gain);gain.connect(this.master);
        osc.start(now);osc.stop(now+i*0.3+9);
      });
    },2000);
  }

  setFloor(floor){if(this.started)this.startDrone(floor==='u'?'upper':'ground')}
  enterDarkness(){if(this.started)this.startDrone('darkness')}
  leaveDarkness(floor){if(this.started)this.startDrone(floor==='u'?'upper':'ground')}
}

// ─────────────── DATA: MEMORY ARTIFACTS ─────────────────

const MEM={
locket:{name:'Tarnished Silver Locket',rd:'A tarnished silver locket lies here, its chain coiled in a neat circle.',ex:'You open the locket. Inside is a faded photograph: a woman with kind eyes and a child on her lap. The photo is so old the edges have turned to velvet. But the woman\'s face — you know that face. A certainty rises in you like a tide.',mem:'The scent of lavender. A kitchen with copper pots and flour dusting every surface. A voice singing — not well, but with such tenderness it didn\'t matter. "My little sparrow," she called you. Mother. She was your MOTHER. The memory is warm and complete, like stepping into sunlight. But her name stays just out of reach.\n\nAnd the song. You can almost hum it. A lullaby — three notes rising, three notes falling. It sits at the edge of your mind like a candle in a window.',tag:'A mother\'s love — she called you her little sparrow.',im:1},
journal:{name:'Water-Damaged Journal',rd:'A journal lies here, its pages bloated and wavy from old water damage.',ex:'Most of the ink has bled beyond reading, but you find a few surviving entries. The handwriting is meticulous, scientific. Dates from 1923. Detailed sketches of ferns and wildflowers with Latin names. You know this handwriting. It\'s yours.',mem:'A greenhouse. Rows of specimen trays. The earthy smell of peat moss and the scratch of a pen on paper. You were a botanist — a professor at a university. Students filed into your lecture hall every Tuesday and Thursday. You loved it. The thrill of classification, of pinning a name to something wild. Ashworth University. That was the place.',tag:'A vocation — you were a professor of botany at Ashworth.',im:1},
pocketwatch:{name:'Stopped Pocket Watch',rd:'A pocket watch sits here, its crystal cracked in a starburst pattern. The hands have stopped.',ex:'It\'s a beautiful piece — silver case, Roman numerals, a delicate chain. The crystal is cracked but the face is legible. Stopped at 11:47. On the back, an engraving: "To E.W. — Until the end of time. — M."',mem:'An October evening. Lanterns hung in the garden, and the maples were the color of fire. She stood across from you in white, and you couldn\'t breathe for how beautiful she was. Margaret. Her name was MARGARET. After the ceremony, she pressed this watch into your hand. "So you\'ll always come home on time," she said, and everyone laughed. E.W. — Elias Wren. That was your name. YOUR name. Elias Wren.',tag:'A wedding — you married Margaret. Your name is Elias Wren.',im:1},
toy_train:{name:'Painted Wooden Train',rd:'A small hand-painted wooden train sits here, its red paint chipped to reveal bare wood.',ex:'The train is light in your hand. The paint was applied by someone who cared more about the giving than the craft. An adult made this for a child.',mem:'A boy. Brown curls, gap-toothed grin, your eyes in a smaller face. He sits on the rug pushing this very train in circles, making engine sounds. "Again, Papa! Make the whistle!" You whistle — two short, one long — and he falls over laughing. Thomas. Your son\'s name was Thomas. You carved this train for his third birthday from cherry wood.',tag:'A son — you had a boy named Thomas.',im:1},
letter:{name:'Sealed Envelope',rd:'A cream-colored envelope lies here, sealed but never posted. The name on the front has faded.',ex:'The envelope is unsealed — the glue gave up long ago. Inside is a single page in a woman\'s handwriting, the ink a deep blue. It begins: "My dearest Elias."',mem:'Margaret\'s handwriting. You\'d know it anywhere now. "My dearest Elias — It has been a year and I still set your place at dinner. Thomas drew you a picture of a train. I put it on your desk. I\'ve kept the study exactly as you left it. I know you\'d scold me for the mess, but I can\'t bring myself to move a single paper. The house is so quiet without you. I hope wherever you are, you can hear me. I hope you know we\'re all right. — Your Margaret."\n\nYou read it twice. A year since what? Where did you go?',tag:'Margaret\'s letter — she missed you terribly.',im:1},
fathers_letter:{name:'Father\'s Letter',rd:'A brittle, yellowed letter lies in the open strongbox.',ex:'The handwriting is rigid, deliberate — each letter formed with the precision of a man who said exactly what he meant. Black ink. Heavy stock. It begins: "Elias —" Not "Dear Elias." Not "My son." Just your name, followed by a dash.',mem:'Your father\'s study. Not like yours — no pressed flowers, no Latin. Ledgers. Account books. Pipe tobacco and boot polish. He stood behind his desk — never sat when delivering a verdict — and said: "You have chosen weeds over this family\'s legacy. Three generations of Wrens have worked this land."\n\nYou tried to explain. Botany. Research. The university. He held up a hand.\n\n"I have nothing more to say to you."\n\nThe letter came six months later. Formal. Final. The farm went to your cousin. You were no longer welcome at holidays. He signed it "R. Wren" — not "Father." Not even "Robert."\n\nMargaret held you that night while you wept. You never wrote back. He died in 1919 without another word between you.\n\nYou kept the letter in a locked box because you couldn\'t bear to read it again. And you couldn\'t bear to throw it away.',tag:'A father\'s silence — some wounds never heal.',im:1}
};

// ─────────────── DATA: FLAVOR OBJECTS ───────────────────

const FLAV={
pipe:{name:'Briar Pipe',rd:'A briar pipe rests in a ceramic dish, its bowl blackened.',ex:'The pipe is well-worn — tooth marks on the stem, old tobacco in the bowl. Cherry and oak. You hold it to your lips without thinking. Natural, but no memory comes.'},
spectacles:{name:'Wire-Rimmed Spectacles',rd:'Wire-rimmed spectacles sit folded on a surface.',ex:'Round lenses, gold wire, one temple bent. You put them on. The world doesn\'t change. But wearing them feels right.'},
chess_piece:{name:'Ivory Chess King',rd:'An ivory chess king lies on its side.',ex:'Hand-carved ivory, heavier than expected. A chip on the crown. You turn it and feel a pang — competitiveness? Fondness? The feeling fades without a face.'},
thimble:{name:'Silver Thimble',rd:'A tiny silver thimble catches the light.',ex:'Engraved with vines — delicate, feminine. Not yours. Smaller, patient hands. You close your fist around it and feel warmth.'},
compass:{name:'Brass Compass',rd:'A brass compass lies here, glass clouded.',ex:'The needle spins then stops. Not north. Toward something, or away? It holds steady, unwavering.'},
pressed_flower:{name:'Pressed Orchid',rd:'A pressed orchid between wax paper sheets.',ex:'Dendrobium nobile. The Latin arrives effortlessly — Orchidaceae, Dendrobieae. You know EVERY plant. The knowledge persists when nothing else does.'},
photograph:{name:'Faded Photograph',rd:'A loose photograph, face-down, edges curling.',ex:'Men in academic robes on stone steps. One waves, grinning. Something familiar about his posture. On the back: \'Faculty, Autumn 1921.\''},
key:{name:'Brass Key',rd:'A brass key on a leather fob.',ex:'A desk or cabinet key. Initials rubbed smooth. You try the nearest keyhole. Doesn\'t fit. Whatever this opened isn\'t here.'},
tin_soldier:{name:'Lead Soldier',rd:'A lead soldier at attention, paint worn bare.',ex:'British infantryman, three inches tall. Paint loved off by small fingers. One arm bent wrong — carefully bent back. A child treasured this.'},
pencil_sketch:{name:'Pencil Sketch',rd:'A pencil sketch on yellowed paper.',ex:'THIS house, drawn from the garden. Smoke from the chimney. A figure at an upstairs window. In the corner: \'Home, Sept. 1919.\''},
cufflinks:{name:'Enamel Cufflinks',rd:'Green enamel cufflinks in a leather box.',ex:'Forest green, each with a tiny fern frond. Custom work for a botanist. Blue velvet lining. No card. But important enough to keep.'},
candle_stub:{name:'Candle Stub',rd:'A half-burned candle in a brass holder.',ex:'Two-inch stub, wax in long drips. The wick is pinched, not blown. Someone stopped working by candlelight. A careful habit.'},
recipe_card:{name:'Handwritten Recipe',rd:'A stained recipe card, spotted with grease.',ex:'\'Mother Wren\'s Blackberry Tart\' — \'use the south hedge berries, north ones are too sour.\' Below: \'Elias says add more sugar. Elias is wrong.\' You smile.'},
magnifying_lens:{name:'Magnifying Lens',rd:'A magnifying lens, brass handle tarnished.',ex:'Large lens, heavy brass. The room leaps into painful detail. Every crack, every mote. You lower it. Some things are better at a distance.'},
sheet_music:{name:'Sheet Music',rd:'Sheet music held with a rusted clip.',ex:'\'Clair de Lune.\' Dog-eared, annotated — \'slower here,\' \'M\'s favorite part.\' Practiced often, for someone who loved it.'},
bird_skull:{name:'Small Bird Skull',rd:'A tiny bird skull on cotton wool.',ex:'Sparrow. Passer domesticus. Fragile, perfect. A naturalist\'s care. Beauty in small bones. You feel tenderness.'},
garden_trowel:{name:'Garden Trowel',rd:'A trowel against the wall, blade crusted.',ex:'Handle worn smooth. Good steel. Your hand knows exactly how to hold it. Muscle memory when the rest is gone.'},
medicine_bottle:{name:'Brown Glass Bottle',rd:'A brown glass bottle, label half-peeled.',ex:'\'Dr. Hartley\'s Cardiac Tonic — one tablespoon, twice daily.\' Nearly empty. Heart medicine. You set it down. Your hand is steady. You feel nothing at all, actually.'},
iron_key:{name:'Blackened Iron Key',rd:'A blackened iron key lies here, heavy for its size.',ex:'Heavy, dark iron. Not a house key — something more deliberate. A safe, or a strongbox. Whatever this opens was meant to stay closed. You turn it in your fingers and feel a reluctance you can\'t explain. Part of you doesn\'t want to know.'}
};

// ─────────────── DATA: ROOMS ────────────────────────────
// Each room has decay arrays: observations at visit thresholds

const RP={
foyer:{n:'The Foyer',f:'g',req:1,d:'A once-handsome entrance hall. Wallpaper peels in long strips and the tile floor is gritty underfoot. A chandelier hangs overhead, crystals clouded. The front door behind you is swollen shut.',a:['You try the front door. It won\'t budge.','A wool overcoat on the rack, grey with dust. It would fit you.','You knew where the staircase was before you saw it.','Same pale light as when you arrived. What time is it?','No sounds from outside. Nothing.'],
  decay:['The wallpaper has gotten worse. Whole sheets on the floor now, exposing dark plaster.','Most of the ceiling plaster has fallen. You can see the lath above, like ribs.','The chandelier crystals are clouded beyond recognition. One has fallen and shattered on the tile.']},
parlor:{n:'The Parlor',f:'g',d:'Two armchairs face a cold fireplace, a chess game mid-play between them. Bookshelves line the walls. Above the mantelpiece: a portrait of a man, a woman, and a small boy.',a:['The man in the portrait. Something about his jaw.','The left armchair fits you naturally.','Books: mostly botany.','White was three moves from checkmate. Why walk away?','You pull \'Flora of the British Isles\' without looking.'],
  decay:['The portrait is darker than before. The faces are harder to make out.','One of the armchairs has collapsed. The upholstery split open like a wound.','Books have fallen from the shelves. Pages scattered across the floor like dead leaves.']},
dining_room:{n:'The Dining Room',f:'g',d:'A long oak table set for four. Plates, glasses, tarnished silverware — a dinner never cleared. A candelabra melted to stubs.',a:['Four settings. A family.','A napkin swan at the smallest place.','Tarnished silver. A household that cared.','A crack in one plate. You knew before you looked.','Dust undisturbed. A very long time.'],
  decay:['A glass has toppled over. How? Nothing touched it.','The table has warped. Plates slide toward the center, gathering like mourners.','The candelabra has tipped. Wax pooled across the table like a frozen flood.']},
kitchen:{n:'The Kitchen',f:'g',d:'Copper pots on hooks, a cast-iron stove gone to rust, a stone sink with a hand pump. Faint smell of rosemary.',a:['Calendar: October 1923. Heart around the 14th.','Herb smell comes and goes.','A teacup with dried tea. Someone\'s last cup.','You open a cupboard by instinct.','Same flat sky through the window.'],
  decay:['The herb smell is gone now. Just dust and rust.','A pot has fallen from its hook. The clang should have echoed, but the house swallowed the sound.','The stove has rusted through. A hole in its side shows the wall behind.']},
cellar:{n:'The Cellar',f:'g',d:'Cool, low-ceilinged. Damp earth. Wine racks line the walls — a few bottles survive, most broken.',a:['\'Bordeaux 1908,\' \'Port 1912.\' Someone took wine seriously.','Mineral cold of stone.','Height marks: \'T.W. — age 3.\' \'T.W. — age 4.\' They stop at 5.','T.W. Thomas Wren? Who stopped measuring?','Quiet. The house feels far away.'],
  decay:['More bottles have fallen. The dark stain on the floor has spread.','The height marks on the wall are crumbling. T.W. — age 3 is barely legible now.','Water is seeping through the mortar. The cellar is slowly drowning.']},
conservatory:{n:'The Conservatory',f:'g',d:'Glass walls, most panes cracked. Wrought-iron plant stands hold husks of dead ferns. A potting bench under dried soil.',a:['Plant stands labeled in Latin.','One fern survives — a green frond uncurling.','Soil under your fingernails. Wait — your nails are clean.','Broken glass underfoot.','A rusted watering can. Care obvious even in ruin.'],
  decay:['The surviving fern has browned. Even stubbornness has limits.','More glass panes have fallen in. The conservatory is more outside than inside now.','The potting bench has collapsed under the weight of accumulated decay.']},
library:{n:'The Library',f:'g',d:'Floor-to-ceiling shelves. A leather reading chair by a standing lamp with no bulb. Old paper and binding glue.',a:['Botany, taxonomy, orchids.','A bookmark halfway through alpine pollination.','The chair fits like it was broken in by your body.','\'Royal Botanical Society.\' 1920 to 1923.','Penciled notes in every margin. Yours.'],
  decay:['Books are swelling with damp. Spines cracking, pages fusing together.','The leather chair is splitting. Horsehair stuffing pokes through like grey grass.','A shelf has buckled. Books piled on the floor in a cairn of lost knowledge.']},
pantry:{n:'The Pantry',f:'g',d:'Narrow room. Shelves of mason jars, tins, crockery. Most labels peeled.',a:['Crystallized honey. Still good, probably.','Labels: \'Blackberry 1922,\' \'Plum 1923.\'','You reach for the tea tin without looking.','Flour hardened to crust.','Comfortable, hands-on.'],
  decay:['A jar has cracked. Dark preserves leak down the shelf like old blood.','The shelves are sagging. Tins have rolled to the floor.','Half the jars are broken now. The room smells of vinegar and time.']},
wash_room:{n:'The Wash Room',f:'g',d:'Stone basin, wooden washboard, a mangle for wringing. Rope lines overhead, empty.',a:['Folded linens, yellowed but neat.','Washboard worn smooth.','Two aprons on pegs — large and small.','Harsh soap, cracked and dry.','A working household.'],

function genHouse(){
  const gR=Object.entries(RP).filter(([,v])=>v.f==='g'&&v.req).map(([k])=>k);
  const gO=shuf(Object.entries(RP).filter(([,v])=>v.f==='g'&&!v.req).map(([k])=>k));
  const uR=Object.entries(RP).filter(([,v])=>v.f==='u'&&v.req).map(([k])=>k);
  const uO=shuf(Object.entries(RP).filter(([,v])=>v.f==='u'&&!v.req).map(([k])=>k));
  const ground=[...gR,...gO.slice(0,3+Math.floor(Math.random()*2))];
  const upper=[...uR,...uO.slice(0,3+Math.floor(Math.random()*3))];
  const allIds=[...ground,...upper];
  const rooms={};
  for(const id of allIds){const t=RP[id];rooms[id]={name:t.n,floor:t.f,desc:t.d,amb:[...t.a],decay:t.decay?[...t.decay]:[],exits:{},items:[],fv:true,visits:0}}
  const dirs=['north','south','east','west'];
  function conn(rd,rl){
    if(rl.length<=1)return;const li=shuf(rl),co=[li[0]],rem=li.slice(1);
    while(rem.length){const nr=rem.shift();const ca=shuf([...co]);
      for(const p of ca){const ap=dirs.filter(d=>!rd[p].exits[d]);const an=dirs.filter(d=>!rd[nr].exits[d]);
        let ok=0;for(const d of ap){const o=OPP[d];if(an.includes(o)){rd[p].exits[d]=nr;rd[nr].exits[o]=p;ok=1;break}}if(ok)break}co.push(nr)}
    for(let t=0;t<30;t++){const[a,b]=shuf(rl);if(!a||!b||Object.values(rd[a].exits).includes(b))continue;
      const af=dirs.filter(d=>!rd[a].exits[d]),bf=dirs.filter(d=>!rd[b].exits[d]);
      for(const d of af){if(bf.includes(OPP[d])){rd[a].exits[d]=b;rd[b].exits[OPP[d]]=a;return}}}}
  conn(rooms,ground);conn(rooms,upper);
  for(const sp of shuf([...dirs])){const o=OPP[sp];
    if(!rooms.foyer.exits[sp]&&!rooms.upstairs_hall.exits[o]){rooms.foyer.exits[sp]='upstairs_hall';rooms.upstairs_hall.exits[o]='foyer';break}}
  const vis=new Set(),q=['foyer'];while(q.length){const r=q.shift();if(vis.has(r))continue;vis.add(r);for(const nb of Object.values(rooms[r].exits))if(!vis.has(nb))q.push(nb)}
  for(const ur of allIds.filter(r=>!vis.has(r))){for(const vr of vis){const vf=dirs.filter(d=>!rooms[vr].exits[d]),uf=dirs.filter(d=>!rooms[ur].exits[d]);
    for(const d of vf){if(uf.includes(OPP[d])){rooms[vr].exits[d]=ur;rooms[ur].exits[OPP[d]]=vr;vis.add(ur);break}}if(vis.has(ur))break}}
  const ai={...MEM,...FLAV};const el=shuf(allIds.filter(r=>r!=='foyer'));
  // Place normal memory artifacts (excluding fathers_letter — it lives in the safe)
  const mk=shuf(Object.keys(MEM).filter(k=>k!=='fathers_letter')),tg=[...el];for(const m of mk)rooms[tg.shift()].items.push(m);
  // Place iron_key and pick safe room (never same room)
  const safeRoom=el.find(r=>!rooms[r].items.length)||el[el.length-1];
  const keyCands=el.filter(r=>r!==safeRoom);
  const ironKeyRoom=pick(keyCands);rooms[ironKeyRoom].items.push('iron_key');
  // Place other flavor objects
  const fk=shuf(Object.keys(FLAV).filter(k=>k!=='iron_key')),nf=6+Math.floor(Math.random()*4),fe=shuf([...el]);
  for(let i=0;i<Math.min(nf,fk.length);i++)rooms[fe[i%fe.length]].items.push(fk[i]);
  return{rooms,allIds,ai,safeRoom}
}

class Game{
  constructor(t){this.t=t;this.snd=new Sound();this.rc=0;this.traces=[];this.totalMoves=0;this._iw()}

  _iw(){
    const{rooms,allIds,ai,safeRoom}=genHouse();this.rooms=rooms;this.ids=allIds;this.ai=ai;
    this.safeRoom=safeRoom;this.safeOpened=false;
    this.cr='foyer';this.inv=[];this.mu=[];this.mv=0;this.go=false;
    // Smart darkness: bias + escalation
    const el=this.ids.filter(r=>r!=='foyer');this.dr=pick(el);
    this.dt=Math.max(4,6-this.rc)+Math.floor(Math.random()*3); // faster after resets
    this.maxEt=Math.max(2,3-Math.floor(this.rc/2)); // fewer turns after resets
    this.et=0;this.da=true;this.dbu=0;
    // Inject traces from previous runs
    if(this.traces.length){const traceRooms=shuf(el);
      for(let i=0;i<Math.min(this.traces.length,3);i++){
        this.rooms[traceRooms[i]].amb.push(this.traces[i])}}
  }

  reset(){
    this.rc++;
    // Generate traces from current run
    const newTraces=[];
    const tmpl=shuf(TRACE_TEMPLATES);
    newTraces.push(tmpl[0].replace('{n}',String(this.rc)));
    if(this.mu.length>0){
      const lastMem=this.ai[this.mu[this.mu.length-1]];
      newTraces.push('You find a scrap of paper. On it, in your handwriting: "'+lastMem.tag.split('—')[0].trim()+'." It means nothing to you now.')
    }
    this.traces=newTraces;

  get mc(){return this.mu.length}
  get ta(){return Object.keys(MEM).length}
  hi(k){return this.inv.includes(k)}
  hm(k){return this.mu.includes(k)}
  hl(){return this.mu.includes('locket')}
  iid(){return this.da&&this.cr===this.dr}
  idn(){return this.da&&Object.values(this.rooms[this.cr].exits).includes(this.dr)}

  // Smart darkness: bias toward rooms with uncollected memory artifacts
  moveDarkness(){
    const hasArtifact=this.ids.filter(r=>r!=='foyer'&&r!==this.cr&&
      this.rooms[r].items.some(i=>this.ai[i]&&this.ai[i].im&&!this.hi(i)));
    const eligible=this.ids.filter(r=>r!=='foyer'&&r!==this.cr&&r!==this.dr);
    // 60% chance to pick artifact room if available
    if(hasArtifact.length&&Math.random()<0.6){this.dr=pick(hasArtifact)}
    else if(eligible.length){this.dr=pick(eligible)}
    this.dt=Math.max(4,6-this.rc)+Math.floor(Math.random()*3);this.et=0;
  }

  tickDarkness(){
    if(!this.da){if(this.mv>=this.dbu){this.da=true;const el=this.ids.filter(r=>r!=='foyer'&&r!==this.cr);if(el.length)this.dr=pick(el);this.dt=Math.max(4,6-this.rc)+Math.floor(Math.random()*3)}return null}
    this.dt--;if(this.dt<=0&&!this.iid())this.moveDarkness();
    if(this.iid()){if(this.et===0){this.et=this.maxEt;return'arr'}this.et--;return this.et<=0?'con':'esc'}
    this.et=0;return this.idn()?'near':null}

  fi(txt){txt=txt.toLowerCase().trim();if(this.ai[txt])return txt;
    for(const[k,it]of Object.entries(this.ai))if(it.name.toLowerCase().includes(txt)||k.includes(txt))return k;
    for(const[k,it]of Object.entries(this.ai))for(const w of txt.split(' '))if(w.length>2&&(it.name.toLowerCase().includes(w)||k===w))return k;return null}

  // ─── Unreliable text: corrupt strings near darkness ───
  corrupt(text,level){
    if(level<=0)return text;
    const chance=level===1?0.06:level===2?0.15:0.3;
    return text.split(' ').map(word=>{
      if(Math.random()>chance)return word;
      const clean=word.toLowerCase().replace(/[^a-z]/g,'');
      for(const[from,to]of CORRUPT_SWAPS){
        if(clean===from)return level>=3?'█'.repeat(word.length):to}
      if(level>=3&&word.length>3)return '—'.repeat(word.length);

    }).join(' ');
  }

  doHelp(){this.t.pl('');this.t.ps();
    [['go <direction>','Move (n, s, e, w)'],['look','Examine surroundings'],['take <item>','Pick up an item'],['examine <item>','Study closely'],['hum','Hum a melody'],['inventory','What you carry'],['memories','What you remember'],['map','Rooms visited'],['help','This list']].forEach(([c,d])=>{this.t.p('    '+c.padEnd(20),'hc');this.t.pl('— '+d,'ht')});
    this.t.pl('');this.t.pl('  Also: n, s, e, w as shortcuts.','ht');this.t.ps()}

  // ─────────── ROOM DESCRIPTION ─────────────────

  async desc(){
    const rm=this.rooms[this.cr];rm.visits++;
    const cl=this.getCorruptLevel();
    this.t.pl('');this.t.pb(rm.name);this.t.pl('');

    // Room description — possibly corrupted
    const desc=cl>0?this.corrupt(rm.desc,cl):rm.desc;
    this.t.pl('  '+desc);

    // Room decay based on total visits
    if(rm.decay.length>0&&rm.visits>=3){
      const di=Math.min(Math.floor((rm.visits-3)/2),rm.decay.length-1);
      this.t.pl('');this.t.pl('  '+rm.decay[di],'decay');
    }

    // Items
    const uc=rm.items.filter(k=>!this.hi(k));
    if(uc.length){this.t.pl('');for(const ik of uc){
      let rd=this.ai[ik].rd;if(cl>0)rd=this.corrupt(rd,cl);
      this.t.pl('  '+rd,'it')}}

    // Show safe if this is the safe room
    if(this.cr===this.safeRoom){this.t.pl('');
      if(this.safeOpened){
        if(!this.hi('fathers_letter'))this.t.pl('  The iron strongbox sits open. Inside: a single yellowed letter.');
        else this.t.pl('  The iron strongbox sits open and empty.');
      }else{
        let sd='An iron strongbox sits in the corner, its lock crusted with age but solid. Whatever is inside was meant to stay private.';
        if(cl>0)sd=this.corrupt(sd,cl);this.t.pl('  '+sd,'it')}}

    // Exits
    const pts=[];for(const[d,rid]of Object.entries(rm.exits)){const tg=this.rooms[rid];
      const st=rm.floor!==tg.floor?(rm.floor==='g'?' ↑stairs':' ↓stairs'):'';
      pts.push(d.toUpperCase()+st+' ('+tg.name+')')}
    this.t.pl('');this.t.pl('  Exits: '+pts.join(', '),'ex');

    // Ambient (revisits only)
    if(!rm.fv){this.t.pl('');
      let amb=pick(rm.amb);if(cl>0)amb=this.corrupt(amb,cl);
      this.t.pl('  '+amb,cl>0?'glitch':'am');

      // Clock ambient (10% chance on revisit)
      if(Math.random()<0.1){this.t.pl('');this.t.pl('  '+this.getClockAmbient(),'clock')}
    }
    rm.fv=false;
  }

  // ─────────── MOVEMENT ─────────────────────────

  async doMv(dir){dir=DSH[dir]||dir;if(!['north','south','east','west'].includes(dir)){this.t.pl('\n  Not a direction.');return false}
    const rm=this.rooms[this.cr];if(!rm.exits[dir]){this.t.pl('\n  Nothing that way — just a wall.');return false}
    const of=rm.floor;this.cr=rm.exits[dir];const nf=this.rooms[this.cr].floor;this.et=0;this.t.se(null);
    this.snd.stopRumble();
    if(of!==nf){this.snd.setFloor(nf);this.t.pl('\n  '+pick(nf==='u'?['You climb the stairs.','You head upstairs.']:['You descend.','You head downstairs.']))}
    else this.t.pl('\n  '+pick(['You walk through the doorway.','You step into the next room.','You head onward.','Quiet footsteps on the old floor.']));
    await this.desc();return true}

  // ─────────── ITEMS ────────────────────────────

  doTk(txt){const k=this.fi(txt);const rm=this.rooms[this.cr];
    if(!k){this.t.pl('\n  Nothing by that name.');return}if(!rm.items.includes(k)){this.t.pl('\n  That isn\'t here.');return}
    if(this.hi(k)){this.t.pl('\n  Already have it.');return}
    this.inv.push(k);this.t.pl('\n  You pick up the '+this.ai[k].name+'.');this.t.pl('  Acquired: '+this.ai[k].name,'acq')}

  async doEx(txt){
    // Check for safe/strongbox examination
    if(['safe','strongbox','box','lockbox'].includes(txt.toLowerCase().trim())){await this.doOpenSafe();return}
    const k=this.fi(txt);if(!k){this.t.pl('\n  Examine what?');return}
    if(!this.hi(k)){const rm=this.rooms[this.cr];if(rm.items.includes(k))this.t.pl('\n  Pick it up first. Try: take '+k);else this.t.pl('\n  You don\'t have that.');return}
    const it=this.ai[k];this.t.pl('');this.t.ps('·');this.t.pl('  '+it.ex);
    if(it.im&&!this.hm(k)){this.mu.push(k);this.t.se('mem');this.snd.playMemoryChord();await this.t.w(800);
      this.t.pl('');this.t.ps('✦');this.t.pl('');this.t.pl('  ░░░  M E M O R Y   R E C O V E R E D  ░░░','mh');this.t.pl('');
      await this.t.sp('  '+it.mem,20,'mt');this.t.pl('');this.t.pl('  ▸ '+it.tag,'mg');this.t.pl('  ▸ Memories: '+this.mc+'/'+this.ta,'mg');
      if(k==='locket'){this.t.pl('');this.t.pl('  ▸ You learned the lullaby. You can HUM it now.','mg')}
      this.t.pl('');this.t.ps('✦');
      if(this.mc===3){await this.t.w(600);this.t.pl('');await this.t.sp('  Elias Wren. Professor. Husband. You have a name. The house is YOURS. So why can\'t you remember leaving?',20)}
      if(this.mc===4){await this.t.w(600);this.t.pl('');await this.t.sp('  A mother, a career, a wife, a son. Someone loved. But: what happened to Elias Wren?',20)}
      if(this.mc===5){await this.t.w(600);this.t.pl('');await this.t.sp('  Not all memories are kind. Some cut. But they\'re yours — every one. The greenhouse AND the closed door. The wedding AND the silence. You can\'t choose which parts of yourself to remember.',20)}
      await this.t.w(500);this.t.se(null);if(this.mc===this.ta)await this.finale();
    }else if(it.im){this.t.pl('\n  The memory is vivid already.')}
    else{this.t.pl('');this.t.pl('  No memories stir, but something about it','fl');this.t.pl('  feels important. You hold onto it.','fl')}}

  // ─────────── HUM ──────────────────────────────

  async doOpenSafe(){
    if(this.cr!==this.safeRoom){this.t.pl('\n  There\'s no safe here.');return}
    if(this.safeOpened){this.t.pl('\n  The strongbox is already open.');return}
    if(!this.hi('iron_key')){this.t.pl('');
      await this.t.sp('  The strongbox is locked. The lock is old iron — heavy, unyielding. You\'d need a key. A substantial one, made for exactly this kind of lock.',20);return}
    this.t.pl('');this.t.ps('·');
    await this.t.sp('  You press the iron key into the lock. It resists — then turns with a grinding click that echoes through the room. The lid swings open on rusted hinges.',20);
    await this.t.w(800);this.t.pl('');
    await this.t.sp('  Inside the strongbox: a single folded letter, its paper brittle and yellowed. Nothing else. Whatever was worth locking away, it was this.',20);
    this.t.pl('');
    await this.t.sp('  You feel a coldness that has nothing to do with the room. Part of you knew this was here. Part of you locked it away on purpose.',20);
    this.t.ps('·');
    this.safeOpened=true;this.rooms[this.safeRoom].items.push('fathers_letter');
    this.t.pl('\n  The letter is here for the taking. If you want it.')}

  async doHum(){if(!this.hl()){this.t.pl('\n  '+pick(DK_NO));return}
    if(this.iid()){this.t.pl('');this.snd.playBanish();await this.t.sp('  '+pick(DK_BAN),20,'db');
      this.da=false;this.dbu=this.mv+8+Math.floor(Math.random()*7);this.et=0;this.t.se(null);this.snd.leaveDarkness(this.rooms[this.cr].floor);
    }else{this.t.pl('\n  You hum the lullaby — three notes rising, three notes falling.');this.snd.playLullaby();
      this.t.pl('  The melody fills the empty room. It feels like company.');
      if(this.idn()){this.t.pl('');this.t.pl('  Somewhere close, something recoils. The heaviness thins.');this.moveDarkness()}}}

  // ─────────── INVENTORY / MEMORY / MAP ─────────

  doInv(){this.t.pl('');this.t.ps();
    if(!this.inv.length)this.t.pl('  You\'re not carrying anything.');
    else{this.t.pl('  You are carrying:');
      const cl=this.getCorruptLevel();
      for(const k of this.inv){let nm=this.ai[k].name;
        // Unreliable inventory names near darkness
        if(cl>=2&&Math.random()<0.3)nm=nm.split(' ').map(w=>Math.random()<0.4?'—'.repeat(w.length):w).join(' ');
        let m='';if(this.mu.includes(k))m=' ✦';else if(this.ai[k].im)m=' (not examined)';
        this.t.pl('    • '+nm+m)}}this.t.ps()}

  doMem(){this.t.pl('');this.t.ps('✦');if(!this.mu.length)this.t.pl('  Nothing. You must have been someone.');
    else{this.t.pl('  W H A T   Y O U   R E M E M B E R:');this.t.pl('');for(const k of this.mu)this.t.pl('    ✦ '+this.ai[k].tag);this.t.pl('');
      const r=this.ta-this.mc;if(r>0)this.t.pl('  '+r+' fragment'+(r!==1?'s':'')+' still missing...')}this.t.ps('✦')}

  doMap(){this.t.pl('');this.t.ps();this.t.pl('  R O O M S   V I S I T E D:');this.t.pl('');
    for(const id of this.ids){const rm=this.rooms[id];if(!rm.fv||id===this.cr){const h=id===this.cr?' ◄':'';
      const uc=rm.items.filter(k=>!this.hi(k));const n=uc.length?' ['+uc.length+']':'';const f=rm.floor==='u'?'▲':'▼';
      this.t.pl('    '+f+' '+rm.name+n+h)}}this.t.pl('');this.t.pl('  ▲ upper  ▼ ground');this.t.ps()}

  doWhisper(){this.t.pl('');this.t.ps('·');this.t.pl('');
    this.t.pl('  You lean close to the wall and whisper.');this.t.pl('');
    this.t.pl('  For a moment, nothing. Then — from beyond the wallpaper,');
    this.t.pl('  beyond the plaster, beyond the house — a voice whispers');
    this.t.pl('  back. Not Elias. Not Margaret. Someone who built these');
    this.t.pl('  walls from words.');this.t.pl('');
    this.t.pl('  "This story was crafted by Michael B. Parks.');
    this.t.phtml('  Visit him at <a href="https://michaelbparks.com" target="_blank" rel="noopener">michaelbparks.com</a>');
    this.t.pl('');this.t.pl('  Thank you for listening."');this.t.pl('');this.t.ps('·')}

  // ─────────── DARKNESS EVENTS ──────────────────

  async hde(ev){
    if(ev==='arr'){this.t.se('dk');this.snd.enterDarkness();this.snd.playDarknessRumble(0);this.t.pl('');this.t.ps('░');
      await this.t.sp('\n  '+pick(DK_ARR),20,'dt');this.t.pl('');
      this.t.pl('  '+this.et+' moment'+(this.et!==1?'s':'')+'. '+(this.hl()?'HUM or RUN.':'LEAVE. NOW.'),'du');this.t.ps('░');return false}
    if(ev==='esc'){this.t.se('dk');this.snd.playDarknessRumble(this.maxEt-this.et);
      const ms=DK_ESC[this.et]||DK_ESC[1];this.t.pl('');this.t.ps('░');
      await this.t.sp('\n  '+pick(ms),20,'dt');this.t.pl('');
      if(this.et===1)this.t.pl('  Last chance. '+(this.hl()?'HUM or LEAVE.':'RUN.'),'du');
      else this.t.pl('  '+this.et+' left.','du');this.t.ps('░');return false}
    if(ev==='con'){this.t.se('dk');this.snd.playDarknessRumble(2);this.t.pl('');this.t.ps('░');this.t.pl('');
      await this.t.sp('  The darkness reaches you.',30,'dc');await this.t.w(1000);this.t.pl('');
      await this.t.sp('  It doesn\'t hurt. That\'s the worst part. It feels like falling asleep — like letting go. The memories unspool: Thomas, Margaret, the greenhouse, the lullaby. One by one.',25,'dc');await this.t.w(800);this.t.pl('');
      await this.t.sp('  You forget your son\'s name.',35,'dc');await this.t.w(600);
      await this.t.sp('  You forget your wife\'s face.',35,'dc');await this.t.w(600);
      await this.t.sp('  You forget your mother\'s song.',35,'dc');await this.t.w(600);
      await this.t.sp('  You forget that you forgot.',40,'dc');await this.t.w(1500);this.t.pl('');
      await this.t.sp('  And then...',80,'dc');this.t.pl('');this.t.ps('░');
      this.snd.stopDrone();this.snd.stopRumble();this.t.se(null);return true}
    if(ev==='near'){this.t.pl('');this.t.pl('  '+pick(DK_NEAR),'dw');return false}return false}

  // ─────────── FINALE ───────────────────────────

  async finale(){
    this.t.di();this.snd.stopDrone();this.snd.stopRumble();
    await this.t.w(2000);this.t.cl();this.t.pl('');this.t.ps('═');this.t.pl('');

    await this.t.sp('  Margaret\'s letter. You read it a third time, slower.',30,'ft');await this.t.w(800);this.t.pl('');
    await this.t.sp('  "It has been a year."',35,'ft');await this.t.w(600);
    await this.t.sp('  "I\'ve kept the study exactly as you left it."',35,'ft');await this.t.w(600);
    await this.t.sp('  "I hope wherever you are, you can hear me."',35,'ft');await this.t.w(1500);this.t.pl('');
    await this.t.sp('  You told yourself she was writing to someone away on a trip. An absence that could be explained.',25,'ft');await this.t.w(800);
    await this.t.sp('  But people on trips come home. Margaret said "wherever you are." She said "I hope you can hear me."',25,'ft');await this.t.w(1000);
    await this.t.sp('  Those aren\'t words you write to someone who\'s coming back.',30,'ft');await this.t.w(2000);

    this.t.pl('');this.t.ps();this.t.pl('');
    await this.t.sp('  The pocket watch. Stopped at 11:47. The crystal cracked — but you never asked what cracked it.',25,'ft');await this.t.w(800);
    await this.t.sp('  It cracks when it hits a desk. When someone falls forward.',30,'fr');await this.t.w(1200);this.t.pl('');
    await this.t.sp('  The study. The chair at that angle. You thought someone stood up.',25,'ft');await this.t.w(800);
    await this.t.sp('  Nobody stood up.',40,'fr');await this.t.w(2000);

    this.t.pl('');this.t.ps();this.t.pl('');
    await this.t.sp('  You walk to the nearest mirror. Wipe it clean.',25,'ft');await this.t.w(800);
    await this.t.sp('  The room is reflected perfectly. Where you are standing, there is nothing.',25,'fr');await this.t.w(2500);

    // ─── INTERACTIVE TWIST ───
    this.t.pl('');this.t.ps('✦');this.t.pl('');
    await this.t.sp('  You understand now. Don\'t you?',30,'fr');await this.t.w(1500);
    this.t.pl('');this.t.pl('  What happened to Elias Wren?','twist-input');this.t.pl('');

    const answer=await this.t.gi(true);
    const understood=answer&&/\b(die[ds]?|dead|death|kill|ghost|spirit|passed|gone|heart|buried|never\s*left)\b/i.test(answer);

    this.t.pl('');
    this.snd.playFinale();

    if(understood){
      await this.t.sp('  Yes.',50,'fr');await this.t.w(1500);this.t.pl('');
    }else{
      await this.t.sp('  You don\'t want to say it. So the house says it for you.',30,'ft');await this.t.w(1500);this.t.pl('');
    }

    this.t.se('mem');

    await this.t.sp('  Your name was Elias Wren.',40,'fr');await this.t.w(600);
    await this.t.sp('  You were a professor of botany at Ashworth University.',35,'fr');await this.t.w(600);
    await this.t.sp('  You married Margaret on an October evening in 1911.',35,'fr');await this.t.w(600);
    await this.t.sp('  Your son Thomas had your eyes and her laugh.',35,'fr');await this.t.w(600);this.t.pl('');
    await this.t.sp('  Your father Robert never forgave you for leaving the farm.',35,'ft');await this.t.w(600);
    await this.t.sp('  He died in 1919 without another word between you.',35,'ft');await this.t.w(600);
    await this.t.sp('  You kept his letter in a locked box because you couldn\'t read it again.',35,'ft');await this.t.w(600);
    await this.t.sp('  And you couldn\'t throw it away.',35,'ft');await this.t.w(1000);this.t.pl('');
    await this.t.sp('  On November 2nd, 1923, you were working late. You felt a tightness in your chest. Your watch struck the desk and cracked.',30,'ft');await this.t.w(800);
    await this.t.sp('  The time was 11:47 PM.',40,'fr');await this.t.w(1200);
    await this.t.sp('  Margaret found you the next morning. She kept the study exactly as you left it.',30,'ft');await this.t.w(800);
    await this.t.sp('  She never moved a single paper.',35,'ft');await this.t.w(2000);

    this.t.pl('');this.t.ps('✦');this.t.pl('');
    await this.t.sp('  The front door that wouldn\'t open. The light that never changed. The silence outside.',25,'ft');await this.t.w(800);this.t.pl('');
    await this.t.sp('  The house isn\'t abandoned. The house is all that\'s left.',30,'fr');await this.t.w(1200);
    await this.t.sp('  You didn\'t find this place. You never left it.',30,'fr');await this.t.w(1500);

    if(this.rc>0){this.t.pl('');
      await this.t.sp('  You have been here since 11:47 PM on November 2nd, 1923. The darkness that swallowed you '+this.rc+' time'+(this.rc!==1?'s':'')+' — it wasn\'t a monster. It was forgetting. Every time it took you, the house reshuffled around the gap. But you came back. You always came back.',20,'ft')}
    else await this.t.sp('  You have been here since 11:47 PM on November 2nd, 1923. A hundred years.',25,'ft');
    await this.t.w(1500);this.t.pl('');
    await this.t.sp('  And the only reason you couldn\'t see yourself in the mirror is that there is nothing left to see.',30,'fr');await this.t.w(2000);

    if(this.rc>0){this.t.pl('');
      await this.t.sp('  The darkness stirs one last time. It reaches for you.',25,'ft');await this.t.w(800);
      await this.t.sp('  But you are Elias Wren. Six memories and a hundred years of stubbornness. You are not nothing.',25,'fr');await this.t.w(800);
      this.snd.playLullaby();
      await this.t.sp('  You hum the lullaby — all of it — and the darkness dissolves like frost in morning sun.',25,'fc');await this.t.w(1200)}

    this.t.pl('');this.t.ps('═');this.t.pl('');
    await this.t.sp('  Somewhere, a curtain falls open. Beyond the glass — light. Warm, golden, October.',25,'fc');await this.t.w(1200);this.t.pl('');

    if(understood){
      await this.t.sp('  Margaret is waiting in the garden. She doesn\'t look surprised.',30,'fc');await this.t.w(800);
      await this.t.sp('  "I knew you\'d figure it out," she says. "You always were the clever one."',35,'fc');
    }else{
      await this.t.sp('  "There you are," Margaret says. "We\'ve been waiting."',35,'fc');
    }
    await this.t.w(1200);
    await this.t.sp('  Thomas waves. "Come ON, Papa!"',35,'fc');await this.t.w(1500);this.t.pl('');
    await this.t.sp('  And behind them, further back, almost at the edge of the light — a man. Older. Stiff-backed. He doesn\'t smile. But he\'s there. He came.',25,'ft');await this.t.w(1000);
    await this.t.sp('  Your father lifts his hand. Not a wave. Just an open palm. The closest Robert Wren ever came to saying he was wrong.',25,'ft');await this.t.w(1500);this.t.pl('');
    await this.t.sp('  The window opens easily. October air. Wood smoke and apples. For the first time in a hundred years, you feel the breeze.',25,'fc');await this.t.w(800);this.t.pl('');
    await this.t.sp('  You step through.',50,'fc');await this.t.w(2000);

    this.t.pl('');this.t.ps();this.t.pl('');
    await this.t.sp('  The house stands quiet. The rocking chair is still. The pocket watch reads 11:47.',25,'ft');await this.t.w(800);this.t.pl('');
    await this.t.sp('  The chair in the study is pushed neatly in — as though someone has finally finished their work.',25,'ft');await this.t.w(1000);
    await this.t.sp('  The strongbox sits open. The letter is gone.',25,'ft');await this.t.w(500);this.t.pl('');
    await this.t.sp('  The front door swings open. Autumn light floods the foyer.',25,'fc');await this.t.w(800);
    await this.t.sp('  The house breathes out, long and slow, and is still.',30,'fc');
    this.t.se(null);await this.t.w(2000);

    this.t.pl('');this.t.pl('');this.t.ps('═');this.t.pl('');
    const vi=Object.values(this.rooms).filter(r=>!r.fv).length;
    const ti=Object.values(this.rooms).reduce((s,r)=>s+r.items.length,0);
    this.t.pl('          T H E   F O R G O T T E N   O N E','fi');this.t.pl('');
    this.t.pl('             Memories: '+this.mc+'/'+this.ta,'fs');
    this.t.pl('             Items: '+this.inv.length+'/'+ti,'fs');
    this.t.pl('             Rooms: '+vi+'/'+Object.keys(this.rooms).length,'fs');
    this.t.pl('             Moves: '+this.totalMoves,'fs');
    if(this.rc>0)this.t.pl('             Times consumed: '+this.rc,'fs');
    this.t.pl('             Understood: '+(understood?'Yes':'No'),'fs');
    this.t.pl('');this.t.pl('      Thank you for helping Elias remember.','fk');this.t.pl('      Thank you for helping him go home.','fk');
    this.t.pl('');this.t.ps('═');this.t.pl('');this.go=true}

  // ─────────── PARSER ───────────────────────────

  pc(raw){const p=raw.split(/\s+/);if(!p.length)return[null,''];let c=p[0],a=p.slice(1).join(' ');
    if('n s e w north south east west'.split(' ').includes(c))return['go',c];
    const al={go:'go',move:'go',walk:'go',run:'go',flee:'go',look:'look',l:'look',
      examine:'examine',x:'examine',inspect:'examine',study:'examine',read:'examine',
      take:'take',get:'take',grab:'take',pick:'take',hum:'hum',sing:'hum',lullaby:'hum',
      open:'open',unlock:'open',use:'open',
      inventory:'inventory',inv:'inventory',i:'inventory',memories:'memories',memory:'memories',remember:'memories',
      help:'help','?':'help',map:'map',m:'map',quit:'quit',exit:'quit',q:'quit',
      whisper:'whisper',credits:'whisper',about:'whisper',author:'whisper'};
    return[al[c]||c,a]}
}

// ─────────── BOOT ───────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{new Game(new Terminal()).start()});
</script>
